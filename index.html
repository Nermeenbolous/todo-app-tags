<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager | Persistence & Tags</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <h1>Task Manager</h1>
        
        <form id="todo-form">
            <div class="input-row">
                <input type="text" id="task-input" placeholder="What needs to be done?" aria-label="Task name">
                <select id="tag-input" aria-label="Select Tag">
                    <option value="">No Tag</option>
                    <option value="school">School</option>
                    <option value="work">Work</option>
                    <option value="personal">Personal</option>
                </select>
            </div>
            <button type="submit" id="add-btn">Add Task</button>
            <p id="error-msg" style="color:red; display:none; font-size: 0.8rem; margin-top: 5px;">
                Task name cannot be blank!
            </p>
        </form>

        <hr>

        <div class="filter-section">
            <div class="filter-btns">
                <button onclick="setFilter('all')" class="active">All</button>
                <button onclick="setFilter('active')">Active</button>
                <button onclick="setFilter('completed')">Completed</button>
            </div>
            
            <div class="tag-filter-container">
                <label for="tag-filter">Filter by Tag:</label>
                <select id="tag-filter" onchange="setTagFilter(this.value)">
                    <option value="all">All Tags</option>
                    <option value="school">School</option>
                    <option value="work">Work</option>
                    <option value="personal">Personal</option>
                    <option value="none">No Tag</option>
                </select>
            </div>
        </div>

        <p id="counter">0 active tasks</p>

        <ul id="todo-list">
            </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
